<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>计算器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .display .expression {
      color: #8899aa;
      font-size: 14px;
      min-height: 20px;
      word-break: break-all;
    }

    .display .result {
      color: #e0e0e0;
      font-size: 36px;
      font-weight: 600;
      word-break: break-all;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      padding: 18px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-weight: 500;
    }

    button:active { transform: scale(0.95); }

    .btn-num {
      background: #1a1a40;
      color: #e0e0e0;
    }
    .btn-num:hover { background: #252560; }

    .btn-op {
      background: #e94560;
      color: #fff;
    }
    .btn-op:hover { background: #ff6b81; }

    .btn-func {
      background: #533483;
      color: #e0e0e0;
    }
    .btn-func:hover { background: #6a42a0; }

    .btn-eq {
      background: #0f9b58;
      color: #fff;
      grid-column: span 2;
    }
    .btn-eq:hover { background: #12b566; }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-func" onclick="clearAll()">AC</button>
      <button class="btn-func" onclick="toggleSign()">+/-</button>
      <button class="btn-func" onclick="inputPercent()">%</button>
      <button class="btn-op" onclick="inputOp('/')">÷</button>

      <button class="btn-num" onclick="inputNum('7')">7</button>
      <button class="btn-num" onclick="inputNum('8')">8</button>
      <button class="btn-num" onclick="inputNum('9')">9</button>
      <button class="btn-op" onclick="inputOp('*')">×</button>

      <button class="btn-num" onclick="inputNum('4')">4</button>
      <button class="btn-num" onclick="inputNum('5')">5</button>
      <button class="btn-num" onclick="inputNum('6')">6</button>
      <button class="btn-op" onclick="inputOp('-')">−</button>

      <button class="btn-num" onclick="inputNum('1')">1</button>
      <button class="btn-num" onclick="inputNum('2')">2</button>
      <button class="btn-num" onclick="inputNum('3')">3</button>
      <button class="btn-op" onclick="inputOp('+')">+</button>

      <button class="btn-num" onclick="inputNum('0')">0</button>
      <button class="btn-num" onclick="inputDot()">.</button>
      <button class="btn-eq" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let previous = '';
    let operator = '';
    let shouldReset = false;

    const display = document.getElementById('result');
    const expr = document.getElementById('expression');

    function updateDisplay() {
      display.textContent = current;
    }

    function inputNum(n) {
      if (shouldReset) {
        current = '';
        shouldReset = false;
      }
      if (current === '0' && n !== '.') {
        current = n;
      } else {
        current += n;
      }
      updateDisplay();
    }

    function inputDot() {
      if (shouldReset) {
        current = '0';
        shouldReset = false;
      }
      if (!current.includes('.')) {
        current += '.';
      }
      updateDisplay();
    }

    function inputOp(op) {
      if (operator && !shouldReset) {
        calculate();
      }
      previous = current;
      operator = op;
      shouldReset = true;
      expr.textContent = previous + ' ' + formatOp(op);
    }

    function formatOp(op) {
      return { '+': '+', '-': '−', '*': '×', '/': '÷' }[op] || op;
    }

    function calculate() {
      if (!operator || previous === '') return;
      const a = parseFloat(previous);
      const b = parseFloat(current);
      let result;
      switch (operator) {
        case '+': result = a + b; break;
        case '-': result = a - b; break;
        case '*': result = a * b; break;
        case '/': result = b === 0 ? '错误' : a / b; break;
      }
      expr.textContent = previous + ' ' + formatOp(operator) + ' ' + current + ' =';
      current = typeof result === 'string' ? result : formatResult(result);
      operator = '';
      previous = '';
      shouldReset = true;
      updateDisplay();
    }

    function formatResult(n) {
      if (Number.isInteger(n)) return n.toString();
      return parseFloat(n.toPrecision(12)).toString();
    }

    function clearAll() {
      current = '0';
      previous = '';
      operator = '';
      shouldReset = false;
      expr.textContent = '';
      updateDisplay();
    }

    function toggleSign() {
      if (current === '0') return;
      current = current.startsWith('-') ? current.slice(1) : '-' + current;
      updateDisplay();
    }

    function inputPercent() {
      current = formatResult(parseFloat(current) / 100);
      updateDisplay();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') inputNum(e.key);
      else if (e.key === '.') inputDot();
      else if (e.key === '+') inputOp('+');
      else if (e.key === '-') inputOp('-');
      else if (e.key === '*') inputOp('*');
      else if (e.key === '/') { e.preventDefault(); inputOp('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (!shouldReset) {
          current = current.length > 1 ? current.slice(0, -1) : '0';
          updateDisplay();
        }
      }
    });
  </script>
</body>
</html>
